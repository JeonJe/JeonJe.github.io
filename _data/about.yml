writing_style:
  title: "글 속에서 발견한 나"
  note: "타임라인의 글들을 AI가 읽고, 이런 사람이구나를 정리해봤습니다."
  cards:
    - title: "끝까지 이유를 찾는 사람"
      description: "문제를 만나면 서둘러 덮지 않고, 왜 이런 일이 생겼는지 차분히 추적한다."
    - title: "복잡함을 풀어내는 사람"
      description: "어려운 실무 문제를 구조로 풀어내고, 팀이 이해하기 쉬운 형태로 바꾸려 노력한다."
    - title: "기술보다 가치를 먼저 보는 사람"
      description: "멋진 기술보다 지금 필요한 효과를 먼저 본다. 사용자와 팀에 실제 도움이 되는 선택을 고민한다."
    - title: "배움을 나누며 함께 크는 사람"
      description: "시행착오도 숨기지 않고 기록하며, 그 경험을 팀의 성장과 다음 개선으로 이어가려 한다."
