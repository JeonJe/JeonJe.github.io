    - year: "2023"
      theme: "새 시작"
      story: >-
        개발자로 전향하기 위해 퇴사 후 부트캠프에 뛰어들었다. 잘한 선택일까? 불안했다. 하지만 병원과 환자에게 도움이 되는 서비스를 만들어가는 과정에서, 그 물음에 대해 "잘한 선택이였다" 라는 대답을 얻을 수 있었다. 그리고 일을 더 잘하고 싶은 마음이 더 많이 들기 시작하였다.
      keywords:
