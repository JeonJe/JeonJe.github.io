            - month: "3월"
              title: "MySQL 데드락 발생 프로시저 개선기"
              summary: "원인 추적부터 해결까지"
              href: "/posts/geultto-mysql-deadlock-improvement/"
        - label: "밖 — 대외활동과 성장"
          posts:
            - month: "9월"
              title: "'왜?'를 묻는 개발자로"
              summary: "2년차 성장 회고"
