intro: "매년 부족함을 느꼈고, 매년 더 잘하고 싶었습니다. 첫 시작은 불안했지만, 기초부터 다시 쌓고 \"왜?\"를 묻게 되면서 조금씩 깊어졌습니다. 지금은 개인의 성장을 넘어, 함께라는 가치를 배우고 있습니다."

timeline:
  title: "Timeline"
  years:
    - year: "2026"
      theme: "함께 성장"
      story: >-
        경험이 하나씩 쌓이면서, 더 빠르게 성장하려면 혼자가 아니라 함께여야 한다는 걸 느꼈다. 함께 성장한다는 건 나란히 걸어가는 게 아니라, 서로를 이끌고 따라가며 더 빠르게 성장하는 것이었다. 요즘은 "나는 무엇을 줄 수 있지?"를 고민하고 있다. 올해는 배운 것을 실무에 녹이고 팀에 나누는 성장 루프를 만들며, 망설이지 않고 부딪혀보려 한다.
      keywords:
        - "함께"
        - "성장루프"
      posts:
        - month: "1월"
          title: "루프팩 백엔드 2기 회고"
          href: "/posts/loopers-backend-2nd-review/"

    - year: "2025"
      theme: "안/밖 깊어지기"
      story: >-
        일단 돌아가게 만들기 급급했던 시절을 지나, 하나씩 알아가고 경험을 쌓으면서 "왜 이렇게 해야 하지?", "왜 이 방법이 최선일까?"를 찾아보는 개발자가 되어가고 있었다. 여러 프로젝트를 거치며 회사에서의 개발 깊이와 도메인 이해도가 점점 높아졌고, 그 경험들을 글로 꾸준히 남겼다. 회사 밖에서는 멘토링과 대외활동을 통해 다양한 연차의 사람들과 이야기하며, 우물 안 개구리에서 벗어나 시야를 넓히려고 노력했다. 가르치면서 배우고, 설명하면서 정리되는 감각도 알게 됐다. "잘하고 있는 걸까?" 고민은 늘 있었지만, 돌아보면 안과 밖 모두에서 한 뼘씩 깊어진 해였다.
      keywords:
        - "깊이"
        - "왜?"
        - "멘토링"
        - "시야"
      post_groups:
        - label: "안 — 실무 개선"
          posts:
            - month: "10월"
              title: "AI가 통계를 바꾼 순간"
              summary: "프롬프트 엔지니어링부터 비동기 전환"
              href: "/posts/hospital-statistics-ai-improvement/"
            - month: "10월"
              title: "병원 통계 시스템 리팩토링"
              summary: "중복 로직 제거로 신뢰도 높이기"
              href: "/posts/hospital-statistics-domain-refactoring/"
            - month: "10월"
              title: "Redis 분산 락 구현"
              summary: "예약 시스템 동시성 제어"
              href: "/posts/redis-distributed-lock-concurrency-control/"
            - month: "10월"
              title: "Docker 레이어 캐시로 빌드 시간 단축"
